<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inscripción - Torneo de Mus</title>
    <style>
        :root { --primary: #27ae60; --bg-color: #f0f3f4; --card-bg: #ffffff; --text-main: #2c3e50; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { text-align: center; color: var(--primary); margin-top: 0; }
        p { text-align: center; color: #7f8c8d; font-size: 0.9em; margin-bottom: 25px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; font-size: 1em; }
        input:focus { border-color: var(--primary); outline: none; }
        button { width: 100%; padding: 15px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #1e8449; }
        .success-msg { display: none; text-align: center; color: #27ae60; font-weight: bold; background: #e8f8f5; padding: 20px; border-radius: 8px; border: 2px dashed #27ae60; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="container" id="form-container">
        <h1>🃏 Apúntate al Torneo</h1>
        <p>Rellena los datos de tu pareja para inscribirte. El administrador confirmará tu plaza en breve.</p>
        
        <form id="formularioMus">
            <label for="nombrePareja">Nombre de la Pareja / Equipo *</label>
            <input type="text" id="nombrePareja" placeholder="Ej: Hugo Quijada - Carlos Quijada" required>

            <label for="telefono">Teléfono de contacto *</label>
            <input type="tel" id="telefono" placeholder="Para avisos y grupos de WhatsApp" required>

            <button type="submit">Enviar Inscripción</button>
        </form>
    </div>

    <div class="container success-msg" id="success-msg">
        🎉 ¡Inscripción enviada!<br><br>
        <span style="font-weight: normal; color:#333; font-size: 0.9em;">Tus datos han sido registrados correctamente. Podrás ver tu pareja en la app cuando la organización te asigne un grupo.</span>
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAEsULVtB_DGK65CseESvzAunU3_MjjaiI",
      authDomain: "padel-4d591.firebaseapp.com",
      projectId: "padel-4d591",
      storageBucket: "padel-4d591.firebasestorage.app",
      messagingSenderId: "8047356944",
      appId: "1:8047356944:web:db6ea9e5d99ba371b2ae95",
      measurementId: "G-1T4924FJ7E"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById('formularioMus').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.querySelector('button');
        btn.innerText = "Enviando..."; btn.disabled = true;

        const data = {
            id: "PEND-" + Date.now().toString(),
            nombrePareja: document.getElementById('nombrePareja').value.trim(),
            jugador1: document.getElementById('jugador1').value.trim(),
            jugador2: document.getElementById('jugador2').value.trim(),
            telefono: document.getElementById('telefono').value.trim(),
            fecha: new Date().toLocaleString()
        };

        // Guardamos en una colección temporal de pendientes
        db.collection("inscripciones_pendientes").doc(data.id).set(data).then(() => {
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';
        }).catch((error) => {
            alert("Error al enviar: " + error);
            btn.innerText = "Enviar Inscripción"; btn.disabled = false;
        });
    });
</script>
</body>
</html>
